workflows:
  ios-build:
    name: iOS Build (VolleyballAI Signed)

    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Clean iOS folder
        script: rm -rf ios

      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS archive (SIGNED)
        script: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)

          echo "Workspace detected: $WORKSPACE"

          export DEVELOPER_TEAM="2G78XY4X97"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "VolleyballAI" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            DEVELOPMENT_TEAM=$DEVELOPER_TEAM \
            CODE_SIGN_STYLE=Automatic \
            archive

    artifacts:
      - $CM_BUILD_DIR/build.xcarchive