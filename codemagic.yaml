workflows:
  ios-build:
    name: iOS Build (Expo Dev Client)
    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Generate native iOS project
        script: |
          npx expo prebuild --clean --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS archive
        script: |
          cd ios
          SCHEME=$(ls *.xcodeproj | sed 's/.xcodeproj//')
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme $SCHEME \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive archive

    artifacts:
      - $CM_BUILD_DIR/build.xcarchive