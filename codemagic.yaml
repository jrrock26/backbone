- name: Build iOS archive
  script: |
    cd ios

    WORKSPACE=$(ls *.xcworkspace | head -n 1)

    echo "Workspace: $WORKSPACE"

    xcodebuild \
      -workspace "$WORKSPACE" \
      -scheme "volleyballai" \
      -configuration Release \
      -sdk iphoneos \
      -archivePath $CM_BUILD_DIR/build.xcarchive archive