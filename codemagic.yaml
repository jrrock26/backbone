- name: Build iOS archive
  script: |
    cd ios

    echo "Finding valid xcworkspace..."

    WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)

    echo "Workspace found: $WORKSPACE"

    if [ -z "$WORKSPACE" ]; then
      echo "ERROR: No .xcworkspace found. Expo prebuild failed."
      exit 1
    fi

    xcodebuild \
      -workspace "$WORKSPACE" \
      -scheme "volleyballai" \
      -configuration Release \
      -sdk iphoneos \
      -archivePath $CM_BUILD_DIR/build.xcarchive archive