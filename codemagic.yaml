workflows:
  ios-build:
    name: iOS Build (Expo Clean)
    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: Build iOS archive
        script: |
          cd ios

          WORKSPACE=$(ls *.xcworkspace | head -n 1)

          echo "Workspace: $WORKSPACE"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "volleyballai" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive archive

    artifacts:
      - $CM_BUILD_DIR/build.xcarchive