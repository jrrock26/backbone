workflows:
  ios-build:
    name: iOS Build (Expo Debug Schemes)
    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Clean iOS folder
        script: rm -rf ios

      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: Debug Xcode Schemes (IMPORTANT)
        script: |
          cd ios
          xcodebuild -list -workspace VolleyballAI.xcworkspace

      - name: Build iOS archive (NO SCHEME YET - DEBUG MODE)
        script: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)

          echo "Workspace detected: $WORKSPACE"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive archive

    artifacts:
      - $CM_BUILD_DIR/build.xcarchive