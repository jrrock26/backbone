workflows:
  ios-build:
    name: iOS Build (Scheme Discovery Only)
    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Clean iOS folder
        script: rm -rf ios

      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: List Xcode Schemes (CRITICAL STEP)
        script: |
          cd ios
          xcodebuild -list -workspace VolleyballAI.xcworkspace

    artifacts:
      - $CM_BUILD_DIR/build.xcarchive