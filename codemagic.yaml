workflows:
  ios-backbone:
    name: iOS Build (Expo + VisionCamera)
    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Expo prebuild (generate native ios project)
        script: |
          npx expo prebuild --clean --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS archive
        script: |
          cd ios
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme $(ls *.xcodeproj | sed 's/.xcodeproj//') \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive archive

    artifacts:
      - $CM_BUILD_DIR/build.xcarchive
      - build/ios/**/*.ipa