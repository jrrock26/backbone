workflows:
  ios-backbone:
    name: iOS Backbone Build
    environment:
      xcode: latest
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prebuild native iOS project
        script: |
          npx expo prebuild --clean --platform ios

      - name: Ensure bridging header imports ReplayKitRecorder
        script: |
          cd ios
          HEADER=$(find . -name "*Bridging-Header.h" | head -n 1)
          if [ -z "$HEADER" ]; then
            echo "ERROR: Bridging header not found after prebuild"
            exit 1
          fi
          echo '#import "ReplayKitRecorder.h"' >> $HEADER

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS
        script: |
          xcodebuild \
            -workspace backbone-clean.xcworkspace \
            -scheme backbone-clean \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            archive

    artifacts:
      - build/ios/**/*.ipa
      - $CM_BUILD_DIR/build.xcarchive

