workflows:
  ios-build:
    name: iOS Build (VolleyballAI)

    environment:
      xcode: latest
      node: 18

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: Install provisioning profile
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "Installing provisioning profile..."
          cp "$CM_PROVISIONING_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/
          ls ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS archive (Manual Signing)
        script: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)

          export DEVELOPMENT_TEAM="2G78XY4X97"
          export PROFILE_NAME="VolleyballAI Distribution2"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "VolleyballAI" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build.xcarchive \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

    artifacts:
      - $CM_BUILD_DIR/build.xcarchive
